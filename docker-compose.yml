name: workato-take-home

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: orders
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d orders"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./backend
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000
    environment:
      SERVICE_NAME: api
      DATABASE_URL: postgresql://app:app@postgres:5432/orders
      DASHBOARD_CORS_ORIGINS: http://localhost:3000
      # The API cannot inspect Compose's worker replica count at runtime.
      # Keep this value in sync with worker.deploy.replicas below.
      DASHBOARD_CONFIGURED_WORKER_COUNT: "3"
    ports:
      - "8080:8000"
    depends_on:
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')",
        ]
      interval: 10s
      timeout: 3s
      retries: 10

  downstream-sim:
    build:
      context: ./backend
    command: uvicorn downstream_sim.app:app --host 0.0.0.0 --port 8000
    environment:
      SERVICE_NAME: downstream-sim
      DOWNSTREAM_SIM_CORS_ORIGINS: http://localhost:3000
      RESTAURANT_CONFIRM_AFTER_SECONDS_MIN: "1"
      RESTAURANT_CONFIRM_AFTER_SECONDS_MAX: "8"
      RESTAURANT_CONFIRM_RETRY_AFTER_SECONDS: "1"
      RESTAURANT_START_PREP_AFTER_SECONDS_MIN: "1"
      RESTAURANT_START_PREP_AFTER_SECONDS_MAX: "8"
      RESTAURANT_START_PREP_RETRY_AFTER_SECONDS: "1"
      RESTAURANT_READY_AFTER_SECONDS_MIN: "5"
      RESTAURANT_READY_AFTER_SECONDS_MAX: "30"
      RESTAURANT_READY_RETRY_AFTER_SECONDS: "2"
      COURIER_ASSIGN_AFTER_SECONDS_MIN: "1"
      COURIER_ASSIGN_AFTER_SECONDS_MAX: "10"
      COURIER_ASSIGN_RETRY_AFTER_SECONDS: "1"
      COURIER_DELIVERED_AFTER_SECONDS_MIN: "10"
      COURIER_DELIVERED_AFTER_SECONDS_MAX: "60"
      COURIER_DELIVERED_RETRY_AFTER_SECONDS: "3"
    ports:
      - "8081:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')",
        ]
      interval: 10s
      timeout: 3s
      retries: 10

  loadgen:
    build:
      context: ./backend
    command: uvicorn loadgen.app:app --host 0.0.0.0 --port 8000
    environment:
      SERVICE_NAME: loadgen
      API_BASE_URL: http://api:8000
      LOADGEN_MAX_INFLIGHT: "1000000"
      LOADGEN_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8082:8000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz')",
        ]
      interval: 10s
      timeout: 3s
      retries: 10

  worker:
    build:
      context: ./backend
    command: python -m worker.main
    environment:
      SERVICE_NAME: worker
      DATABASE_URL: postgresql://app:app@postgres:5432/orders
      DATABASE_POOL_MIN_SIZE: "1"
      DATABASE_POOL_MAX_SIZE: "2"
      DOWNSTREAM_SIM_BASE_URL: http://downstream-sim:8000
      DOWNSTREAM_REQUEST_TIMEOUT_SECONDS: "2"
      TASK_RETRY_DELAY_SECONDS: "5"
      READY_CHECK_INITIAL_DELAY_SECONDS: "2"
      READY_CHECK_INTERVAL_SECONDS: "2"
      READY_CHECK_DEADLINE_SECONDS: "60"
      DELIVERY_CHECK_INITIAL_DELAY_SECONDS: "3"
      DELIVERY_CHECK_INTERVAL_SECONDS: "3"
      DELIVERY_CHECK_DEADLINE_SECONDS: "120"
      UNSUPPORTED_TASK_RELEASE_DELAY_SECONDS: "30"
    depends_on:
      migrator:
        condition: service_completed_successfully
      downstream-sim:
        condition: service_healthy
    deploy:
      replicas: 3

  migrator:
    build:
      context: ./backend
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/orders
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0 --port 3000
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      VITE_LOADGEN_BASE_URL: http://localhost:8082
      VITE_DOWNSTREAM_SIM_BASE_URL: http://localhost:8081
      VITE_RESTAURANT_CONFIRM_AFTER_SECONDS_MIN: "1"
      VITE_RESTAURANT_CONFIRM_AFTER_SECONDS_MAX: "8"
      VITE_RESTAURANT_START_PREP_AFTER_SECONDS_MIN: "1"
      VITE_RESTAURANT_START_PREP_AFTER_SECONDS_MAX: "8"
      VITE_RESTAURANT_READY_AFTER_SECONDS_MIN: "5"
      VITE_RESTAURANT_READY_AFTER_SECONDS_MAX: "30"
      VITE_COURIER_ASSIGN_AFTER_SECONDS_MIN: "1"
      VITE_COURIER_ASSIGN_AFTER_SECONDS_MAX: "10"
      VITE_COURIER_DELIVERED_AFTER_SECONDS_MIN: "10"
      VITE_COURIER_DELIVERED_AFTER_SECONDS_MAX: "60"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
